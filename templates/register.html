{% extends "base.html" %}
{% block content %}
<div class="auth-container glass-panel">
    <h2>Create an Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="input-group-vertical">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group-vertical">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="input-group-vertical">
            <label for="customer_id">Link a Customer ID (Optional for Demo Testing)</label>
            <input type="text" id="customer_id" name="customer_id" placeholder="e.g. 17850 or 13047">
        </div>
        <button type="submit" class="primary-btn full-width">Sign Up</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
</div>
{% endblock %}
