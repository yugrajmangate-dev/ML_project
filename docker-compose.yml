version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root}
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:5000 app:app --workers 3
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-yourpassword}
      DB_NAME: ${DB_NAME:-ecommerce_db}
      DB_PORT: 3306
      FLASK_ENV: development
      RATELIMIT_STORAGE_URL: redis://redis:6379/0
      CACHE_TYPE: redis
      CACHE_REDIS_URL: redis://redis:6379/1
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./:/app

volumes:
  db_data:
